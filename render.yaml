services:
  - type: web
    name: dom-lenta-ai-photo
    runtime: python
    plan: free
    buildCommand: pip install -r dom_lenta_photo_app/requirements.txt
    startCommand: gunicorn --chdir dom_lenta_photo_app app:app
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: SECRET_KEY
        generateValue: true
